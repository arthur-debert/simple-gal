# pixi workspace — seeded by `shipit install` (the managed blocks below
# need a valid manifest). Consumer-owned from here on: edit freely.
[workspace]
name = "arthur-debert_simple-gal"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64", "win-64"]

[tasks]
# >>> shipit-managed test task (do not edit; regenerate via `shipit install`) >>>
test = "./bin/shipit test"
# <<< shipit-managed test task <<<
# >>> shipit-managed tasks (do not edit; regenerate via `shipit install`) >>>
changelog = "./bin/shipit changelog"
lint = "./bin/shipit lint"
logs = "./bin/shipit logs"
# <<< shipit-managed tasks <<<

[feature.lint.dependencies]
# >>> shipit-managed rust lint toolchain (do not edit; regenerate via `shipit install`) >>>
# The fleet-pinned rust lint toolchain (#547 Layer 1) — delivered because this
# repo tracks a Cargo.toml, which is exactly what makes the rust leg of `shipit
# lint` run (cargo clippy / cargo fmt per tracked manifest). conda-forge's
# `rust` is the official toolchain (cargo + clippy + rustfmt included), so the
# leg stops hard-failing (127) on hosts and CI runners without cargo (#526).
# Same pin as shipit's own [feature.test.dependencies] rust. If this repo no
# longer ships rust (the last Cargo.toml is gone), delete this block and its
# `pixi.toml#shipit-rust-lint-toolchain` entry in .shipit.toml's [managed]
# table — a reconcile only ADDS toolchain blocks, it never retires one.
rust = "1.96.*"
# <<< shipit-managed rust lint toolchain <<<
# >>> shipit-managed lint deps (do not edit; regenerate via `shipit install`) >>>
# The fleet-pinned lint toolchain (https://github.com/arthur-debert/shipit/blob/main/docs/legacy-prd/adoption.md:
# the managed set owns the consumer environment).
# Canonical versions live HERE — a bump is one data edit, rolled fleet-wide on
# each consumer's next `shipit install` reconcile.
ruff = "0.15.*"
# shellcheck is PINNED DOWN to 0.10.* (not 0.11): shellcheck 0.11.0 has an SC2218
# reaching-definitions false positive — a call to an EARLIER-defined function is
# flagged "defined later" when a subshell (`$(...)`, a pipeline component, `<(...)`)
# sits near the call, reddening the hermetic gate on CORRECT code across 5+ fleet
# repos. 0.11.0 is the latest upstream (no fixed 0.11.x yet); restore 0.11+ when
# upstream fixes it.
shellcheck = "0.10.*"
# conda-forge name for the `shfmt` binary
go-shfmt = "3.*"
yamllint = "1.38.*"
prettier = "3.8.*"
markdownlint-cli = "0.49.*"
# GitHub Actions workflow gate — the actions Lang of `shipit lint` (TOL01-WS04)
actionlint = "1.7.*"
lefthook = "2.1.*"
# <<< shipit-managed lint deps <<<

[feature.lint.tasks]
# The wf-checks LINT LANE's run (ADP02-WS05, #127), byte-modeled on lex#829 /
# shipit's own: the lint toolchain (ruff/shfmt/prettier/markdownlint/actionlint/
# rust 1.96) lives in THIS feature's env, so the lane task must resolve into the
# lint env — the managed bare `lint` task is a fixed plain string that runs in
# the default env (where none of those tools exist on a hosted runner). No
# `provision lexd` step (unlike lex's): this repo tracks zero .lex files, so
# the lex Lang of `shipit lint` never runs here. Defined ONLY in this feature,
# so it exists in EXACTLY ONE env (lint) and bare `pixi run lint-full` resolves
# unambiguously — the wf-checks matrix job's `pixi run --locked lint-full` and
# a laptop run are identical.
lint-full = { cmd = "./bin/shipit lint" }

[environments]
# >>> shipit-managed environments (do not edit; regenerate via `shipit install`) >>>
lint = ["lint", "shipit-lexd"]
# <<< shipit-managed environments <<<

# Consumer-owned dependencies (outside the shipit-managed blocks above),
# ADP02-WS05 (#127): the wf-checks TEST LANE runs `pixi run --locked test`
# (→ `./bin/shipit test` → the rust leg's `cargo nextest run`) on a hosted
# runner where nothing outside pixi is provisioned (hosted images no longer
# carry Rust, and the pinned planner emits no env/cache descriptors that would
# put a toolchain on PATH) — so the default env must carry the full
# `cargo nextest` stack itself. Same conda-forge rust pin as the managed
# [feature.lint.dependencies] block.
[dependencies]
# >>> shipit-managed rust release deps (do not edit; regenerate via `shipit install`) >>>
# The rust RELEASE-side bump tool (#793, the #784-F2 failure class): `shipit
# release prepare`'s rust bump adapter runs `cargo set-version --workspace`
# (a cargo-edit subcommand), and wf-prepare executes shipit in the DEFAULT
# pixi env (`pixi run --locked ./bin/shipit`), so cargo-edit anchors HERE —
# [dependencies], not a feature — where that run's PATH resolves it (cargo
# finds subcommands via $CARGO_HOME/bin then PATH, the #785 finding).
# Provisioned from conda-forge under setup-pixi's lockfile-keyed cache (the
# #582 doctrine: the release run NEVER `cargo install`s). Pinned to the patch
# line (`0.13.11.*` — conda match-spec, so any 0.13.11.x build resolves); a
# bump is one data edit, rolled out on each consumer's next `shipit install`
# reconcile. If this repo no longer ships rust (the last Cargo.toml is gone),
# delete this block and its `pixi.toml#shipit-rust-release-deps` entry in
# .shipit.toml's [managed] table — a reconcile only ADDS toolchain blocks, it
# never retires one.
cargo-edit = "0.13.11.*"
# The wasm/npm bundle composition's builder (TOL02-WS12 #788, WS10 DECIDED
# #798): `shipit release bundle`'s wasm-pack composition runs `wasm-pack build`
# to turn a rust crate into an npm package tree, then `npm pack`s the tarball
# — the artifact. wasm-pack is on conda-forge, so it anchors HERE (the rust
# release-deps block, rust signal) beside cargo-edit rather than
# self-provisioning (the cargo-deb #785 exception is for tools conda-forge does
# NOT carry). Provisioned under setup-pixi's lockfile-keyed cache (the #582
# doctrine: the release run NEVER installs at run time). Pinned to the
# minor line (`0.15.*` — conda match-spec); a bump is one data edit, rolled out
# on each consumer's next `shipit install` reconcile. 0.15.* per #846: the
# original 0.13.* pin was never solvable — conda-forge never published any
# 0.13.x wasm-pack build (verified on osx-arm64 + linux-64) — so every
# consumer's default env died at solve.
wasm-pack = "0.15.*"
# NOTE: wasm-pack does NOT pull the wasm32 target std — its only conda deps
# are __glibc/libgcc (osx: __osx), so the WS12 record's claim that it did was
# false (#853). The std is a sysroot COMPONENT, so it anchors in the
# rust-release-toolchain block beside `rust`, NOT here: it must be delivered
# (and skipped, when a consumer owns its `rust` pin) with the sysroot it
# belongs to, while this block delivers unconditionally on the rust signal.
# NOTE: rattler-build (the conda endpoint's packager) used to ride HERE too
# (ARF01-WS01 #950) — but it is the ENDPOINT's tool, not a rust tool, and
# gating it on the rust signal starved a NON-rust conda producer (tree-sitter's
# `tarball` grammar) of its packager (the #1071 seed failure). It now rides the
# conda-endpoint-gated `pixi.toml#shipit-conda-packager` block
# (src/shipit/data/pixi-conda-packager-block.toml), delivered iff the repo
# declares a `conda` endpoint — so a rust+conda repo gets it EXACTLY once and a
# rust-without-conda repo (which publishes no `.conda`) no longer carries it.
# <<< shipit-managed rust release deps <<<
rust = "1.96.*"
cargo-nextest = ">=0.9.138,<0.10"
# uv backs the pinned bin/shipit launcher (ADR-0033: it provisions the repo's
# pinned shipit via uv, PATH-independent). Both wf-checks lanes run
# `pixi run --locked <task>` -> ./bin/shipit on a hosted runner where uv is
# not otherwise present, so the launcher's one prerequisite must ride the env
# too. (Known gap shipit#758: the block/managed set should own this.)
uv = ">=0.5"

# >>> shipit-managed lexd feature (do not edit; regenerate via `shipit install`) >>>
[feature.shipit-lexd]
# lexd — the lex Lang's lint-gate tool — resolved as an ordinary conda package
# from the public Artifact channel (ADR-0066: `provision lexd` retired). The
# channel is scoped to THIS reserved feature (a sibling of conda-forge, added to
# whatever env `shipit-lexd` is wired into — the lint env), so lexd rides
# pixi.lock and pixi's sha256 like every other linter, and `shipit install`
# keeps the whole fleet on ONE lexd version — uniformity moved from a compiled
# binary constant to this managed block (ADR-0047: not consumer config).
channels = ["https://storage.googleapis.com/shipit-artifacts-public/lex-fmt/lex"]

# The fleet-pinned lexd, PLATFORM-SCOPED via pixi `[target]` tables. This file is
# the block HEADER; `shipit install` GENERATES one
# `[feature.shipit-lexd.target.<plat>.dependencies]` table below per platform in
# (this repo's declared `[workspace].platforms` ∩ the channel's CLOSED SERVED SET
# — `SERVED_SUBDIRS`, `src/shipit/channel/buckets.py`:
# osx-arm64/linux-64/linux-aarch64 AND win-64), pinned to `LEXD_PIN`
# (`src/shipit/install/units.py`, the single pin edit) — NEVER a blanket
# `[feature.shipit-lexd.dependencies]`. See `units.lexd_block`; a bump is one edit
# to `LEXD_PIN`, rolled fleet-wide on each consumer's next reconcile.
#
# Why intersect with the repo's OWN declared platforms (#1072): a `[target]`
# selector for a platform the workspace does NOT declare makes pixi warn on EVERY
# invocation (`target selector 'win-64' does not match any of the platforms
# supported by the workspace`) — fleet-wide noise (hit on shipit's own `main`
# after #1068 emitted a fixed all-of-served target set). A repo emits a target
# only for a platform it actually declares.
#
# Why intersect with the served set (#1068) — load-bearing AND fail-closed:
#  - A BLANKET `[feature.shipit-lexd.dependencies]` applied lexd to EVERY platform
#    a composing env declares, so a consumer declaring a platform OUTSIDE the
#    served set (e.g. osx-64, Intel Mac) had no channel candidate and got an
#    unsatisfiable lint-env solve — `shipit install` then failed closed with no
#    commit and no reconcile (#1068). Platforms NOT in the served set carry NO
#    lexd dep, so their lint env SOLVES and install/reconcile no longer breaks.
#  - win-64 IS in the served set (served, merely owner-PAUSED under the Windows
#    build pause #895, ADR-0071). A repo that DECLARES win-64 keeps a win-64
#    target and FAILS CLOSED at solve (the channel serves no win-64 lexd while the
#    pause holds — ADR-0071's "Windows consumers fail closed, loudly"); a repo
#    that does NOT declare win-64 emits no win-64 target (and no dangling-selector
#    warning). It re-resolves automatically when #895 lifts — no edit here.
[feature.shipit-lexd.target.osx-arm64.dependencies]
lexd = "==0.19.10"
[feature.shipit-lexd.target.linux-64.dependencies]
lexd = "==0.19.10"
[feature.shipit-lexd.target.linux-aarch64.dependencies]
lexd = "==0.19.10"
[feature.shipit-lexd.target.win-64.dependencies]
lexd = "==0.19.10"
# <<< shipit-managed lexd feature <<<
