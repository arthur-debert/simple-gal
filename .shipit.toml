# [secrets] — repo Actions secrets. Each table key is the GitHub secret NAME; the
# value names exactly one source ({ doppler = "KEY" } / { env = "VAR" } /
# { prompt = true }). Seeded with shipit's local-reviewer (codex/agy) GitHub App
# credentials, each sourced from Doppler github/prd. `shipit gh-setup` only pushes
# a secret when its source resolves, so these are safe before the App is installed.
[secrets]
CODEX_REVIEW_APP_PRIVATE_KEY = { doppler = "CODEX_REVIEW_APP_PRIVATE_KEY" }
CODEX_REVIEW_APP_ID          = { doppler = "CODEX_REVIEW_APP_ID" }
AGY_REVIEW_APP_PRIVATE_KEY   = { doppler = "AGY_REVIEW_APP_PRIVATE_KEY" }
AGY_REVIEW_APP_ID            = { doppler = "AGY_REVIEW_APP_ID" }

# [reviewers] — the required-reviewer SET for this repo's PRs (the map KEYS are
# required; ALL must be DONE to flip Ready). Seeded with shipit's shipped default
# (Copilot, review-once), rendered from the single source in
# `prstate.reviewers_config.DEFAULT_REVIEWERS`. codex/agy are NOT seeded by default —
# their review GitHub Apps are not installed on an arbitrary repo, so requiring them
# would park PRs at REVIEWS_PENDING; a repo that HAS the Apps opts them in here (e.g.
# `codex = {}`). Review-once: `rerun` defaults OFF (token-billed; opt in per reviewer
# with e.g. `copilot = { rerun = true }`).
[reviewers]
copilot = {}

# [lint].ignore — paths the managed lint gate must SKIP. Seeded with common
# generated/assembled files (a built CHANGELOG, package lockfiles) that are not
# hand-written prose, so a freshly-onboarded repo does not take a latent gate
# failure on them. Gitignore-style globs. You OWN this list and may extend it —
# it is reconcile-safe: `shipit install` seeds [lint] only when absent and never
# clobbers a table you have edited.
[lint]
ignore = [
  "CHANGELOG.md",
  "CHANGELOG/**",
  "package-lock.json",
  "pnpm-lock.yaml",
]

# [lanes] — the declared PR-time check units (ADP02-WS05, #127). The lane
# planner (`shipit ci plan`) maps these + the CI event + a path-diff to the job
# matrix the wf-checks workflow block runs (`pixi run --locked <run>` per job).
# Modeled on the lex#829 first-consumer cutover; both lanes' tasks
# SELF-PROVISION, because on a hosted runner nothing outside pixi exists:
#   - `lint-full` (NOT the managed bare `lint` task, which runs in the default
#     env where no lint tool exists on a runner) resolves into the pixi lint
#     env, where the managed toolchain lives — see [feature.lint.tasks] in
#     pixi.toml. No lexd provisioning: this repo tracks zero .lex files, so
#     the lex Lang of `shipit lint` never runs.
#   - `test` is the managed pixi task (`./bin/shipit test` → the rust leg's
#     `cargo nextest run`; a REAL task, so the #444 POSIX-`test` trap does not
#     apply). Its whole toolchain (rust, cargo-nextest, uv for the pinned
#     launcher) rides pixi's default env ([dependencies] in pixi.toml). No
#     submodules or fixture downloads to provision inline: fixtures/ is
#     in-tree, and the Chrome-bound browser tests are `#[ignore]`d.
[lanes.lint]
run = "lint-full"
required = true
local = true

[lanes.test]
run = "test"
required = true
local = true

[toolchains]
"." = "rust"

# [artifacts] — simple-gal's declared Artifact set for the shipit release
# pipeline (ADP02-WS08, arthur-debert/shipit#841; modeled on dodot's
# signed-darwin consumer map, #239). The legacy surface it replaces is
# release.yml → rust-cli.yml@v3 (`crates: simple-gal`, `bin-name:
# simple-gal`, `windows-archs: 'x86_64'`, defaults: darwin arm64 + linux
# gnu x86_64/aarch64, brew, apt, signed darwin via `secrets: inherit`).
# Windows is OMITTED per the fleet-wide windows pause (shipit#895,
# asset-parity-minus-windows): legacy release.yml REMAINS the windows
# producer until #895 resumes the leg.
#   - [artifacts.simple-gal] is the binary archive artifact (the brew
#     formula subject): archive composition over the three native-runner
#     platforms the legacy matrix built. The composition emits
#     `<name>-<triple>.tar.gz` per unix lane — exact legacy asset-name
#     parity for the non-windows surface. Distributed to gh-release +
#     crates (single crate) + brew (the tap is shipit's portfolio
#     constant, arthur-debert/homebrew-tools, which already carries
#     simple-gal.rb — same as legacy; the brew formula assembler keys
#     off the darwin/linux triples only).
#   - [artifacts.simple-gal-deb] is the legacy `apt: true` leg: cargo-deb
#     against the pre-built release binary (riding the
#     [package.metadata.deb] variants in Cargo.toml), linux platforms
#     only, gh-release only (legacy attached the .debs to the GH release;
#     there is no apt repository endpoint).
# `sign = true` on the archive artifact: simple-gal ships SIGNED darwin
# (legacy parity), routed through the signer's archive leg (shipit#800:
# raw darwin CLI binaries codesigned + notarized in-place, tarballs
# re-emitted under their original filenames). The bare flag derives the
# Apple cert pair + notary-trio secret requirements in preflight; the
# non-darwin (linux) lanes ship unsigned, as legacy did.
[artifacts.simple-gal]
build = [{ toolchain = "rust", package = "simple-gal" }]
platforms = ["darwin-arm64", "linux-x86_64", "linux-arm64"]
bundle = { composition = "archive" }
sign = true
endpoints = ["gh-release", "crates", "brew"]

[artifacts.simple-gal-deb]
build = [{ toolchain = "rust", package = "simple-gal" }]
platforms = ["linux-x86_64", "linux-arm64"]
bundle = { composition = "deb" }
endpoints = ["gh-release"]

