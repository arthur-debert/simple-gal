# cargo-release configuration
# Usage: cargo release patch|minor|major

# Changelog handling is done by bin/changelog (fragment-directory model,
# release/#201). The pre-release hook cuts unreleased fragments into a
# versioned file and re-renders CHANGELOG.md. cargo-release's own
# markdown surgery is disabled.
pre-release-hook = ["bin/changelog", "new-version", "{{version}}"]
pre-release-replacements = []

# Create a git tag like v0.1.0
tag-name = "v{{version}}"
tag-message = "Release v{{version}}"

# Commit the version bump and changelog update
pre-release-commit-message = "chore: release v{{version}}"

# Don't publish to crates.io from local — CI handles that
publish = false

# Push the tag (which triggers the CI release workflow)
push = true
